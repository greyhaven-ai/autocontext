name: publish-pi-autocontext

on:
  push:
    tags:
      - "pi-v*"
  workflow_dispatch:

concurrency:
  group: publish-pi-autocontext-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    environment: publish-pi-autocontext
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: pi
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Validate tag matches Pi package version
        if: startsWith(github.ref, 'refs/tags/pi-v')
        run: |
          expected="${GITHUB_REF_NAME#pi-v}"
          actual="$(node -p "require('./package.json').version")"
          if [ "$actual" != "$expected" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match pi/package.json version ${actual}." >&2
            exit 1
          fi
      - name: Install dependencies
        run: npm ci
      - name: Show npm version
        run: npm --version
      - name: Lint package
        run: npm run lint
      - name: Test package
        run: npm test
      - name: Build package
        run: npm run build
      - name: Publish to npm
        run: npm publish --access public --provenance
